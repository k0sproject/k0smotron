apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k0smotron.fullname" . }}-manager-rolebinding
  labels:
    {{- include "k0smotron.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k0smotron.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "k0smotron.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
