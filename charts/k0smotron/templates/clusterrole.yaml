# Rules are a mode-conditional merge of:
#   standalone: config/standalone/rbac/role.yaml
#   clusterapi: config/clusterapi/all/rbac/role.yaml
# CRDs are auto-synced by `make helm-sync` (runs as part of `make manifests`).
# RBAC rules are NOT auto-synced — review both source files when `make manifests` changes them.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k0smotron.fullname" . }}-manager-role
  labels:
    {{- include "k0smotron.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
- apiGroups: [""]
  resources: [configmaps, persistentvolumeclaims, persistentvolumes, secrets, services]
  verbs: [create, delete, get, list, patch, update, watch]
{{- if eq .Values.mode "clusterapi" }}
- apiGroups: [""]
  resources: [events]
  verbs: [create, delete, get, list, patch, update, watch]
{{- end }}
- apiGroups: [""]
  resources: [namespaces]
  verbs: [list]
- apiGroups: [""]
  resources: [nodes]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [pods]
  verbs: [delete, get, list, watch]
- apiGroups: [""]
  resources: [pods/exec]
  verbs: [create]
- apiGroups: [""]
  resources: [secrets/finalizers]
  verbs: [update]
- apiGroups: [apps]
  resources: [statefulsets]
  verbs: [create, delete, get, list, patch, update, watch]
{{- if eq .Values.mode "clusterapi" }}
- apiGroups: [apps]
  resources: [deployments]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [apiextensions.k8s.io]
  resources: [customresourcedefinitions]
  verbs: [get, list, watch]
{{- end }}
- apiGroups: [batch]
  resources: [cronjobs]
  verbs: [create, delete, patch, update]
{{- if eq .Values.mode "clusterapi" }}
- apiGroups: [batch]
  resources: [jobs]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [bootstrap.cluster.x-k8s.io]
  resources:
    - k0scontrollerconfigs
    - k0scontrollerconfigs/status
    - k0sworkerconfigs
    - k0sworkerconfigs/status
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [cluster.x-k8s.io]
  resources: [clusters, clusters/status, machines, machines/status]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [cluster.x-k8s.io, exp.cluster.x-k8s.io]
  resources: [machinepools, machinepools/status]
  verbs: [get, list, watch]
- apiGroups: [controlplane.cluster.x-k8s.io]
  resources:
    - k0scontrolplanes
    - k0scontrolplanes/status
    - k0smotroncontrolplanes
    - k0smotroncontrolplanes/status
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [infrastructure.cluster.x-k8s.io]
  resources:
    - "*"
    - pooledremotemachines
    - pooledremotemachines/status
    - remoteclusters
    - remoteclusters/status
    - remotemachines
    - remotemachines/status
  verbs: [create, delete, get, list, patch, update, watch]
{{- end }}
- apiGroups: [k0smotron.io]
  resources: [clusters, jointokenrequests]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [k0smotron.io]
  resources: [clusters/finalizers, jointokenrequests/finalizers]
  verbs: [update]
- apiGroups: [k0smotron.io]
  resources: [clusters/scale, clusters/status, jointokenrequests/status]
  verbs: [get, patch, update]
- apiGroups: [networking.k8s.io]
  resources: [ingresses]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [storage.k8s.io]
  resources: [storageclasses]
  verbs: [get, list, watch]
