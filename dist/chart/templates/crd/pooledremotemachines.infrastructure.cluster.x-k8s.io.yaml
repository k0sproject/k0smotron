{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cert-manager.io/inject-ca-from: '{{ .Release.Namespace }}/serving-cert'
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    cluster.x-k8s.io/provider: k0sproject-k0smotron
    cluster.x-k8s.io/v1beta1: v1beta1
    cluster.x-k8s.io/v1beta2: v1beta2
  name: pooledremotemachines.infrastructure.cluster.x-k8s.io
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: k0smotron-webhook-service
          namespace: '{{ .Release.Namespace }}'
          path: /convert
      conversionReviewVersions:
        - v1beta1
        - v1beta2
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: PooledRemoteMachine
    listKind: PooledRemoteMachineList
    plural: pooledremotemachines
    singular: pooledremotemachine
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.machine.address
          name: Address
          type: string
        - jsonPath: .status.reserved
          name: Reserved
          type: string
        - jsonPath: .status.machineRef.name
          name: Remote Machine
          type: string
      name: v1beta1
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                machine:
                  properties:
                    address:
                      type: string
                    commandsAsScript:
                      default: false
                      type: boolean
                    customCleanUpCommands:
                      items:
                        type: string
                      type: array
                    port:
                      default: 22
                      type: integer
                    sshKeyRef:
                      properties:
                        name:
                          type: string
                      required:
                        - name
                      type: object
                    useSudo:
                      type: boolean
                    user:
                      default: root
                      type: string
                    workingDir:
                      default: /etc/k0smotron
                      type: string
                  required:
                    - address
                    - sshKeyRef
                  type: object
                pool:
                  type: string
              required:
                - machine
                - pool
              type: object
            status:
              properties:
                machineRef:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                    - name
                    - namespace
                  type: object
                reserved:
                  type: boolean
              required:
                - machineRef
                - reserved
              type: object
          type: object
      served: true
      storage: false
      subresources:
        status: {}
    - additionalPrinterColumns:
        - jsonPath: .spec.machine.address
          name: Address
          type: string
        - jsonPath: .status.reserved
          name: Reserved
          type: string
        - jsonPath: .status.machineRef.name
          name: Remote Machine
          type: string
      name: v1beta2
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                machine:
                  properties:
                    address:
                      type: string
                    cleanUpCommands:
                      items:
                        type: string
                      type: array
                    commandsAsScript:
                      default: false
                      type: boolean
                    port:
                      default: 22
                      type: integer
                    sshKeyRef:
                      properties:
                        name:
                          type: string
                      required:
                        - name
                      type: object
                    useSudo:
                      type: boolean
                    user:
                      default: root
                      type: string
                    workingDir:
                      default: /etc/k0smotron
                      type: string
                  required:
                    - address
                    - sshKeyRef
                  type: object
                pool:
                  type: string
              required:
                - machine
                - pool
              type: object
            status:
              properties:
                machineRef:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                    - name
                    - namespace
                  type: object
                reserved:
                  type: boolean
              required:
                - machineRef
                - reserved
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
{{- end }}
