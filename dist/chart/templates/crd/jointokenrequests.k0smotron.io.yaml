{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cert-manager.io/inject-ca-from: '{{ .Release.Namespace }}/serving-cert'
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    cluster.x-k8s.io/provider: k0sproject-k0smotron
  name: jointokenrequests.k0smotron.io
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: k0smotron-webhook-service
          namespace: '{{ .Release.Namespace }}'
          path: /convert
      conversionReviewVersions:
        - v1beta1
        - v1beta2
  group: k0smotron.io
  names:
    kind: JoinTokenRequest
    listKind: JoinTokenRequestList
    plural: jointokenrequests
    shortNames:
      - jtr
    singular: jointokenrequest
  scope: Namespaced
  versions:
    - deprecated: true
      name: v1beta1
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                clusterRef:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                    - name
                    - namespace
                  type: object
                expiry:
                  default: 0s
                  type: string
                role:
                  default: worker
                  enum:
                    - worker
                    - controller
                  type: string
              required:
                - clusterRef
              type: object
            status:
              properties:
                clusterUID:
                  type: string
                reconciliationStatus:
                  type: string
                tokenID:
                  type: string
              required:
                - reconciliationStatus
              type: object
          type: object
      served: true
      storage: false
      subresources:
        status: {}
    - name: v1beta2
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                clusterName:
                  maxLength: 63
                  minLength: 1
                  type: string
                expiry:
                  default: 0s
                  type: string
                role:
                  default: worker
                  enum:
                    - worker
                    - controller
                  type: string
              required:
                - clusterName
              type: object
            status:
              properties:
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                deprecated:
                  properties:
                    v1beta1:
                      properties:
                        clusterUID:
                          type: string
                        reconciliationStatus:
                          type: string
                      type: object
                  type: object
                tokenID:
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
{{- end }}
