{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cert-manager.io/inject-ca-from: '{{ .Release.Namespace }}/serving-cert'
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    cluster.x-k8s.io/provider: k0sproject-k0smotron
    cluster.x-k8s.io/v1beta1: v1beta1
    cluster.x-k8s.io/v1beta2: v1beta2
  name: k0scontrollerconfigs.bootstrap.cluster.x-k8s.io
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: k0smotron-webhook-service
          namespace: '{{ .Release.Namespace }}'
          path: /convert
      conversionReviewVersions:
        - v1beta1
        - v1beta2
  group: bootstrap.cluster.x-k8s.io
  names:
    kind: K0sControllerConfig
    listKind: K0sControllerConfigList
    plural: k0scontrollerconfigs
    singular: k0scontrollerconfig
  scope: Namespaced
  versions:
    - deprecated: true
      name: v1beta1
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                args:
                  items:
                    type: string
                  type: array
                customUserDataRef:
                  properties:
                    configMapRef:
                      properties:
                        key:
                          type: string
                        name:
                          type: string
                      required:
                        - key
                        - name
                      type: object
                    secretRef:
                      properties:
                        key:
                          type: string
                        name:
                          type: string
                      required:
                        - key
                        - name
                      type: object
                  type: object
                downloadURL:
                  default: https://get.k0s.sh
                  type: string
                files:
                  items:
                    properties:
                      content:
                        type: string
                      contentFrom:
                        properties:
                          configMapRef:
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                            required:
                              - key
                              - name
                            type: object
                          secretRef:
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                            required:
                              - key
                              - name
                            type: object
                        type: object
                      path:
                        type: string
                      permissions:
                        type: string
                    type: object
                  type: array
                ignition:
                  properties:
                    additionalConfig:
                      type: string
                    variant:
                      enum:
                        - fcos
                        - flatcar
                        - openshift
                        - r4e
                        - fiot
                      type: string
                    version:
                      type: string
                  required:
                    - variant
                    - version
                  type: object
                k0s:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                k0sInstallDir:
                  default: /usr/local/bin
                  type: string
                postStartCommands:
                  items:
                    type: string
                  type: array
                preInstalledK0s:
                  type: boolean
                preStartCommands:
                  items:
                    type: string
                  type: array
                tunneling:
                  properties:
                    enabled:
                      default: false
                      type: boolean
                    mode:
                      default: tunnel
                      enum:
                        - tunnel
                        - proxy
                      type: string
                    serverAddress:
                      type: string
                    serverNodePort:
                      default: 31700
                      format: int32
                      type: integer
                    tunnelingNodePort:
                      default: 31443
                      format: int32
                      type: integer
                  type: object
                useSystemHostname:
                  default: false
                  type: boolean
                version:
                  type: string
                workingDir:
                  type: string
              type: object
            status:
              properties:
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                dataSecretName:
                  type: string
                ready:
                  type: boolean
              type: object
          type: object
      served: true
      storage: false
      subresources:
        status: {}
    - name: v1beta2
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                args:
                  items:
                    type: string
                  type: array
                downloadURL:
                  default: https://get.k0s.sh
                  type: string
                files:
                  items:
                    properties:
                      content:
                        type: string
                      contentFrom:
                        properties:
                          configMapRef:
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                            required:
                              - key
                              - name
                            type: object
                          secretRef:
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                            required:
                              - key
                              - name
                            type: object
                        type: object
                      path:
                        type: string
                      permissions:
                        type: string
                    type: object
                  type: array
                k0s:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                k0sInstallDir:
                  default: /usr/local/bin
                  type: string
                postK0sCommands:
                  items:
                    type: string
                  type: array
                preInstalledK0s:
                  type: boolean
                preK0sCommands:
                  items:
                    type: string
                  type: array
                provisioner:
                  properties:
                    customUserDataRef:
                      properties:
                        configMapRef:
                          properties:
                            key:
                              type: string
                            name:
                              type: string
                          required:
                            - key
                            - name
                          type: object
                        secretRef:
                          properties:
                            key:
                              type: string
                            name:
                              type: string
                          required:
                            - key
                            - name
                          type: object
                      type: object
                    ignition:
                      properties:
                        additionalConfig:
                          type: string
                        variant:
                          enum:
                            - fcos
                            - flatcar
                            - openshift
                            - r4e
                            - fiot
                          type: string
                        version:
                          type: string
                      required:
                        - variant
                        - version
                      type: object
                    platform:
                      default: linux
                      enum:
                        - linux
                        - windows
                      type: string
                    type:
                      default: cloud-config
                      enum:
                        - cloud-config
                        - ignition
                        - powershell
                        - powershell-xml
                      type: string
                  type: object
                secretMetadata:
                  properties:
                    annotations:
                      additionalProperties:
                        type: string
                      type: object
                    labels:
                      additionalProperties:
                        type: string
                      type: object
                  type: object
                tunneling:
                  properties:
                    enabled:
                      default: false
                      type: boolean
                    mode:
                      default: tunnel
                      enum:
                        - tunnel
                        - proxy
                      type: string
                    serverAddress:
                      type: string
                    serverNodePort:
                      default: 31700
                      format: int32
                      type: integer
                    tunnelingNodePort:
                      default: 31443
                      format: int32
                      type: integer
                  type: object
                useSystemHostname:
                  default: false
                  type: boolean
                version:
                  type: string
                workingDir:
                  type: string
              type: object
            status:
              properties:
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                dataSecretName:
                  type: string
                initialization:
                  properties:
                    dataSecretCreated:
                      type: boolean
                  type: object
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
{{- end }}
