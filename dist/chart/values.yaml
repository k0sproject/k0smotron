# [MANAGER]: Manager Deployment Configurations
controllerManager:
  replicas: 1
  container:
    image:
      repository: quay.io/k0sproject/k0smotron
      # Defaults to the chart's appVersion when left empty.
      tag: ""
    args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10
  serviceAccountName: k0smotron-controller-manager
# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true
# [CRDs]: To enable the CRDs
crd:
  # This option determines whether the CRDs are included
  # in the installation process.
  enable: true
  # Enabling this option adds the "helm.sh/resource-policy": keep
  # annotation to the CRD, ensuring it remains installed even when
  # the Helm release is uninstalled.
  # NOTE: Removing the CRDs will also remove all cert-manager CR(s)
  # (Certificates, Issuers, ...) due to garbage collection.
  keep: true
# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true
# [WEBHOOKS]: Webhooks configuration
# The following configuration is automatically generated from the manifests
# generated by controller-gen. To update run 'make manifests' and
# the edit command with the '--force' flag
webhook:
  enable: true
# [PROMETHEUS]: To enable a ServiceMonitor to export metrics to Prometheus set true
prometheus:
  enable: false
# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: true
# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false
crds:
  enabled: true
  namespace: k0smotron-system
# [GLOBAL]: Values shared with subcharts (e.g. the CRD subchart).
global:
  # [CONTROLLER]: Which controller to run, mapped to the manager's
  # "--enable-controller" flag. This also selects which CRDs are installed.
  # One of: all, bootstrap, control-plane, infrastructure.
  #   all             - run every controller and install every CRD (default)
  #   bootstrap       - K0sWorkerConfig/K0sControllerConfig (bootstrap.cluster.x-k8s.io)
  #   control-plane   - K0s(motron)ControlPlane (controlplane.cluster.x-k8s.io)
  #                     plus the k0smotron.io CRDs it relies on
  #   infrastructure  - RemoteMachine/RemoteCluster (infrastructure.cluster.x-k8s.io)
  controller: all
  # Adds "helm.sh/resource-policy": keep to the CRDs so they survive a
  # `helm uninstall`. Mirrors crd.keep for the CRD subchart.
  crdKeep: true
