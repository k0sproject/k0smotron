apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: namespace
    app.kubernetes.io/instance: k0smotron
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: k0smotron
    app.kubernetes.io/part-of: k0smotron
    app.kubernetes.io/managed-by: kustomize
  name: k0smotron
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: k0smotron
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: deployment
    app.kubernetes.io/instance: controller-manager
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: k0smotron
    app.kubernetes.io/part-of: k0smotron
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - command:
        - /manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-bind-address=127.0.0.1:8080"
        - "--leader-elect"
        - "--credential-providers-config=/etc/k0smotron/provider-config.json"
        image: controller
        imagePullPolicy: IfNotPresent
        name: manager
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - "ALL"
        volumeMounts:
        - name: credential-plugin
          mountPath: /plugins
          readOnly: true
        - name: credential-providers-config
          mountPath: /etc/k0smotron
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      volumes:
      - name: credential-plugin
        image:
          reference: ghcr.io/labthrust/kubeconfig-secretreader-plugin:v0.0.1-linux-arm64
          pullPolicy: IfNotPresent
      - name: credential-providers-config
        configMap:
          name: credential-providers-config
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
